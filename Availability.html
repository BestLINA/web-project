        body {
            margin: 0;
            font-family: Arial;
            background: #FFF5F7;
        }

        /* TOP TEXT */
        .top {
            padding: 30px 0 10px 0;

        }

        .top-header {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        h1 {
            margin: 0;
            color: #2A1E3F;
        }

        h2 {
            margin: 0;
            color: #2A1E3F;
        }

        .schedule h2 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            margin-top: 5px;
        }

        /* BUTTON */
        .save-btn {
            background: #9B7EDC;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* MAIN LAYOUT */
        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* LEFT BOX */
        .schedule {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            width: 25%;
        }

        /* RIGHT BOX */
        .tips {
            background: #ffffff;
            padding: 15px;
            border-radius: 15px;
            width: 21%;
        }

        /* DAY ROW */
        .day {
            display: flex;
            align-items: center;
            margin: 12px 0;
        }

        .day-left {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 120px;
        }


        select {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .day span {
            margin-left: 5px;
            cursor: pointer;
        }

        /* TIPS */
        .tip {
            margin: 10px 0;
            color: #444;
            line-height: 1.6;
        }

        .time {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
        }

        .dash {
            margin: 0 4px;
            color: #555;
        }

        .flower {
            color: #9B7EDC;
            margin-right: 6px;
        }

        .bottom {
            padding-top: 20px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }

        .tips-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tip-icon {
            width: 50px;
        }
    </style>
