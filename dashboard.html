<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
     <!-- Header -->
    <div class="header">
        <div class="logo-area">
            <img src="imgs/AWJ_logo.png" alt="AWJ logo" width="100" height="auto">
            <h2>AWJ</h2>
        </div>
        <div class="reminder-icon">
            <a href="Reminders.html">
                <img src="imgs/Notification.png" class="notif-icon" alt="notifications">
            </a>
        </div>
    </div>


      
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="courses.html">📚 Courses</a>
        <a href="deadlines.html">📅 Deadlines</a>
        <a href="availability.html">⏰ Availability</a>
        <a href="studyplan.html">📝 Study Plan</a>
        <a href="progress.html">📈 Progress</a>
      </div>
      <a href="login.html" class="logout-link">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <main class="main">
      <h1>Welcome back 👋</h1>

      <div class="grid">
        <div class="card">
          <h3>My Courses</h3>
        </div>

        <div class="card">
          <h3>Upcoming Deadlines</h3>
        </div>

        <div class="card">
          <h3>Study Plan</h3>
        </div>

        <div class="card">
          <h3>Progress</h3>
        </div>
      </div>
    </main>

    <script>
      document.getElementById("darkBtn").onclick = () => {
        document.body.classList.toggle("dark");
      };
    </script>
  </body>
</html>
