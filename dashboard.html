<!doctype html>
<html>
  <head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="logo-area">
        <img src="imgs/AWJ_logo.png" alt="AWJ logo" >
        <span>AWJ Planner</span>
      </div>

      <div class="actions">
        <button id="darkBtn">🌙</button>

        <div class="reminder">
          🔔
          <span class="badge">2</span>
        </div>
      </div>
    </header>

    
    <aside class="sidebar">
      <h2>Study Planner</h2>

      <nav>
        <a href="#">Dashboard</a>
        <a href="#">Courses</a>
        <a href="#">Deadlines</a>
        <a href="#">Availability</a>
        <a href="#">Study Plan</a>
        <a href="#">Progress</a>
      </nav>

      <button class="logout">Logout</button>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <h1>Welcome back 👋</h1>

      <div class="grid">
        <div class="card">
          <h3>My Courses</h3>
        </div>

        <div class="card">
          <h3>Upcoming Deadlines</h3>
        </div>

        <div class="card">
          <h3>Study Plan</h3>
        </div>

        <div class="card">
          <h3>Progress</h3>
        </div>
      </div>
    </main>

    <script>
      document.getElementById("darkBtn").onclick = () => {
        document.body.classList.toggle("dark");
      };
    </script>
  </body>
</html>
