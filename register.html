<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(to bottom, #e6f0ff, #ffffff);
}

.container {
    text-align: center;
}

.logo {
    width: 90px;
    margin-bottom: 10px;
}

h2 {
    color: #1a2a6c;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

a {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(to right, #4facfe, #001f5b);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

    <img src="images/logo.png" class="logo">

    <h2>Register</h2>

    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <a href="dashboard.html">Register</a>

</div>

</body>
</html>
